<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Paguyuban</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<script src="script.js"></script>

<script>
  cekLogin();
</script>

<!-- SIDEBAR -->
<div class="sidebar">

  <h2>MENU</h2>

  <a href="#">👤 Anggota</a>
  <a href="#">📰 Berita</a>
  <a href="#">🖼️ Galeri</a>
  <a href="#">📢 Pengumuman</a>
  <a href="#">⚙️ Pengaturan</a>

  <a href="#" onclick="logout()">🚪 Logout</a>

</div>

<!-- MAIN CONTENT -->
<div class="main">

  <h1>💀 DASHBOARD SYSTEM ACTIVE</h1>

  <p>Selamat datang di sistem Paguyuban Manggarai</p>

  <!-- CARD STATISTIK -->
  <div class="card">
    <h3>Total Anggota</h3>
    <p>120 User</p>
  </div>

  <div class="card">
    <h3>Berita Terbaru</h3>
    <p>Sistem komunitas berjalan normal</p>
  </div>

  <div class="card">
    <h3>Status Sistem</h3>
    <p>🟢 ONLINE</p>
  </div>

  <!-- ========================= -->
  <!-- FORM ANGGOTA (BARU) -->
  <!-- ========================= -->

  <div class="card">

    <h3>➕ TAMBAH ANGGOTA</h3>

    <input type="text" id="nama" placeholder="Nama">

    <select id="jk">
      <option value="">Jenis Kelamin</option>
      <option value="Laki-laki">Laki-laki</option>
      <option value="Perempuan">Perempuan</option>
    </select>

    <input type="text" id="statusAnggota" placeholder="Status Anggota">
    <input type="text" id="code" placeholder="Code Anggota">
    <input type="text" id="hp" placeholder="No HP">
    <input type="text" id="divisi" placeholder="PT / Divisi">

    <select id="onoff">
      <option value="">Status ON/OFF</option>
      <option value="ON">ON</option>
      <option value="OFF">OFF</option>
    </select>

    <button onclick="tambahAnggota()">Simpan</button>

  </div>

  <!-- LIST ANGGOTA -->
  <div class="card">

    <h3>📋 DAFTAR ANGGOTA</h3>

    <ul id="listAnggota"></ul>

  </div>

</div>

<script>
  tampilkanAnggota();
</script>

</body>
</html>
